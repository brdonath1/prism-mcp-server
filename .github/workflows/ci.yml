name: CI

# WHITELIST PATTERN (D-76 / PF-v2 D-131)
# ─────────────────────────────────────────────────────────────────────
# PRISM-managed repos generate high commit volume from state management
# (handoff updates, decisions, session logs, boot tests, intelligence
# briefs). A paths-ignore (blacklist) approach requires manually adding
# every new non-code directory and fails silently when you miss one.
#
# This paths (whitelist) approach is self-maintaining: CI only triggers
# when files that affect the build actually change. New non-code
# directories are excluded by default. No manual upkeep required.
#
# DO NOT revert to paths-ignore. See: prism-framework/_templates/reference/ci-best-practices.md
# ─────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'biome.jsonc'
      - 'vitest.config.ts'
      - 'Dockerfile'
      - 'railway.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'biome.jsonc'
      - 'vitest.config.ts'
      - 'Dockerfile'
      - 'railway.json'
      - '.github/workflows/ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
        env:
          GITHUB_PAT: test-pat-not-real
          GITHUB_OWNER: test-owner
          FRAMEWORK_REPO: prism-framework
